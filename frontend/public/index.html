        <script>
            // Block external platform analytics by intercepting script loads
            const originalAppendChild = Node.prototype.appendChild;
            const originalInsertBefore = Node.prototype.insertBefore;
            
            const blockList = [
                'connect.facebook.net',
                'fbevents.js',
                'facebook.net',
                'googletagmanager.com',
                'google-analytics.com',
                'gtag/js',
                'blitzllama.com',
                'mpc-prod',
                'gameplay.blitzllama'
            ];
            
            // Block platform analytics domains
            const blockPatterns = [/\.bigmannentertainment\.com/, /loading-preview/];
            
            const isBlocked = (src) => blockList.some(b => src.includes(b)) || blockPatterns.some(p => p.test(src));
            
            Node.prototype.appendChild = function(child) {
                if (child.tagName === 'SCRIPT' || child.tagName === 'IFRAME') {
                    const src = child.src || child.getAttribute('src') || '';
                    if (isBlocked(src)) {
                        return child;
                    }
                }
                return originalAppendChild.call(this, child);
            };
            
            Node.prototype.insertBefore = function(child, reference) {
                if (child.tagName === 'SCRIPT' || child.tagName === 'IFRAME') {
                    const src = child.src || child.getAttribute('src') || '';
                    if (isBlocked(src)) {
                        return child;
                    }
                }
                return originalInsertBefore.call(this, child, reference);
            };
            
            // Comprehensive Facebook Pixel stub to prevent errors and warnings
            window.fbq = function() {
                // Silently ignore all Facebook Pixel calls
                return;
            };
            window.fbq.push = function() { return; };
            window.fbq.loaded = true;
            window.fbq.version = '2.0';
            window.fbq.queue = [];
            window.fbq.callMethod = function() { return; };
            window._fbq = window.fbq;
            
            // Prevent Facebook Pixel from initializing
            window.FB = window.FB || {};
            window.FB.init = function() { return; };
            window.FB.AppEvents = { logEvent: function() { return; } };
            
            // Watch for dynamically injected scripts and remove them
            if (typeof MutationObserver !== 'undefined') {
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        mutation.addedNodes.forEach(function(node) {
                            if (node.tagName === 'SCRIPT' || node.tagName === 'IFRAME') {
                                const src = node.src || '';
                                if (isBlocked(src)) {
                                    node.remove();
                                }
                            }
                        });
                    });
                });
                
                // Start observing after DOM is ready
                if (document.body) {
                    observer.observe(document.body, { childList: true, subtree: true });
                } else {
                    document.addEventListener('DOMContentLoaded', function() {
                        observer.observe(document.body, { childList: true, subtree: true });
                    });
                }
            }
            
            // Stub out gtag if Google Analytics tries to load
            window.gtag = function() {
                // Silently ignore Google Analytics calls
                return;
            };
            window.dataLayer = window.dataLayer || [];
            
            // Suppress Meta Pixel console warnings
            const originalConsoleWarn = console.warn;
            console.warn = function(...args) {
                const message = args.join(' ');
                if (message.includes('[Meta Pixel]') || 
                    message.includes('Facebook') || 
                    message.includes('invalid email') ||
                    message.includes('fbevents')) {
                    // Suppress Meta Pixel warnings
                    return;
                }
                originalConsoleWarn.apply(console, args);
            };
            
            // Suppress Meta Pixel console errors
            const originalConsoleError = console.error;
            console.error = function(...args) {
                const message = args.join(' ');
                if (message.includes('connect.facebook.net') || 
                    message.includes('fbevents') ||
                    blockPatterns.some(p => p.test(message))) {
                    return;
                }
                originalConsoleError.apply(console, args);
            };
        </script>
